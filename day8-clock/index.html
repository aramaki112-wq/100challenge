<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DAY8 世界時計</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🌍 世界時計</h1>

        <p>都市を選択してください</p>

        <!-- JavaScriptがここへ都市を追加する -->
        <select id="countrySelect"></select>

        <button id="showButton">
            現在時刻を表示
        </button>

        <div id="clockArea">

            <h2 id="cityName"></h2>

            <p id="date"></p>

            <p id="time"></p>

        </div>

        <button id="listButton">
            一覧表示
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
