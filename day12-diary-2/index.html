<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAY12 日記アプリ Ver2</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>📖 日記アプリ</h1>

    <label for="date">日付を選択</label>

    <input
      type="date"
      id="date"
    >

    <textarea
      id="diary"
      placeholder="今日の出来事を書きましょう"
    ></textarea>

    <button id="saveButton">
      保存
    </button>

    <p id="message"></p>

  </div>

  <script src="script.js"></script>

</body>

</html>
