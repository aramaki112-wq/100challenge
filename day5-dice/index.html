<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY5 サイコロアプリ</title>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 28px;
        }

        button {
            width: 90%;
            max-width: 300px;
            padding: 15px;
            margin: 10px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background-color: #4caf50;
            color: white;
        }

        #diceContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .dice {
            width: 60px;
            height: 60px;
            background-color: white;
            border: 2px solid black;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
        }

        #total {
            font-size: 32px;
            margin-top: 20px;
            font-weight: bold;
        }

        #diceCount {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🎲 DAY5 サイコロアプリ</h1>

    <button id="generateButton">
        サイコロ生成
    </button>

    <div id="diceCount"></div>

    <button id="rollButton">
        振る
    </button>

    <div id="diceContainer"></div>

    <div id="total">
        合計：0
    </div>

    <script src="script.js"></script>

</body>
</html>
