<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY4 表示・非表示アプリ</title>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 28px;
        }

        input {
            width: 90%;
            max-width: 400px;
            font-size: 20px;
            padding: 12px;
            margin: 10px 0;
        }

        button {
            width: 90%;
            max-width: 400px;
            font-size: 20px;
            padding: 15px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #showButton {
            background-color: #4CAF50;
            color: white;
        }

        #hideButton {
            background-color: #f44336;
            color: white;
        }

        #result {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
            word-break: break-word;
        }
    </style>
</head>

<body>

    <h1>DAY4 表示・非表示アプリ</h1>

    <input
        type="text"
        id="textInput"
        placeholder="文字や数字を入力">

    <br>

    <button id="showButton">
        表示する
    </button>

    <button id="hideButton">
        非表示にする
    </button>

    <p id="result"></p>

    <script src="script.js"></script>

</body>
</html>
