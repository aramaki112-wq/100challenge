<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY6 ジャンケンアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>✊ DAY6 ジャンケンアプリ ✋</h1>

    <div class="button-area">
        <button id="rockButton">✊ グー</button>
        <button id="scissorsButton">✌️ チョキ</button>
        <button id="paperButton">✋ パー</button>
    </div>

    <h2 id="playerChoice">あなた：</h2>
    <h2 id="computerChoice">CPU：</h2>

    <p id="result">ボタンを押してください</p>

    <div class="score-box">
        <p>勝ち：<span id="win">0</span></p>
        <p>負け：<span id="lose">0</span></p>
        <p>あいこ：<span id="draw">0</span></p>
        <p>勝率：<span id="rate">0</span>%</p>
    </div>

    <script src="script.js"></script>

</body>
</html>
